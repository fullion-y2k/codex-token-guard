name: Weekly Version PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  weekly-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm test
      - run: npm run version:weekly
      - run: npm test
      - uses: peter-evans/create-pull-request@v8
        with:
          base: main
          branch: automation/weekly-version
          delete-branch: true
          title: "chore: weekly version bump"
          commit-message: "chore: weekly version bump"
          add-paths: |
            package.json
            CHANGELOG.md
          body: |
            Manual fallback for the weekly version bump.

            Checks:
            - npm test before and after the version bump
            - patch version update
            - changelog update

            Recurring version upgrades are owned by Codex Automations. This PR is intentionally reviewable and does not publish a package automatically.
