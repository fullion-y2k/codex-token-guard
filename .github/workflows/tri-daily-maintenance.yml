name: Tri-daily Maintenance PR

on:
  workflow_dispatch:
    inputs:
      focus:
        description: Maintenance focus
        required: false
        default: docs
        type: choice
        options:
          - docs
          - quality
          - release
      force:
        description: Run after the campaign end date
        required: false
        default: false
        type: boolean
  schedule:
    # 09:00, 15:00, and 21:00 Asia/Tokyo during the application campaign.
    # GitHub Actions cron is UTC.
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tri-daily-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    env:
      MAINTENANCE_CAMPAIGN_END_DATE: "2026-06-03"
      MAINTENANCE_BRANCH: automation/tri-daily-maintenance
      MAINTENANCE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      EVENT_SCHEDULE: ${{ github.event.schedule }}
      MANUAL_FOCUS: ${{ github.event_name == 'workflow_dispatch' && inputs.focus || '' }}
      FORCE_MAINTENANCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && '1' || '0' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Resolve maintenance focus
        shell: bash
        run: |
          focus="$MANUAL_FOCUS"
          if [ -z "$focus" ]; then
            case "$EVENT_SCHEDULE" in
              "0 0 * * *") focus="docs" ;;
              "0 6 * * *") focus="quality" ;;
              "0 12 * * *") focus="release" ;;
              *) focus="docs" ;;
            esac
          fi
          echo "MAINTENANCE_FOCUS=$focus" >> "$GITHUB_ENV"
      - run: npm test
      - run: node ./src/cli.js brief "improve Codex context management for open-source maintainers"
      - run: node ./scripts/refresh-maintenance-assets.js
      - run: npm test
      - uses: peter-evans/create-pull-request@v8
        with:
          base: main
          branch: automation/tri-daily-maintenance
          delete-branch: true
          title: "chore: tri-daily maintenance refresh"
          commit-message: "chore: refresh maintenance assets"
          add-paths: |
            docs/MAINTENANCE_STATUS.md
            docs/examples/open-source-maintainer-brief.md
          body: |
            Automated maintenance refresh for the Codex for Open Source application campaign.

            Checks:
            - npm test
            - CLI brief smoke test
            - maintenance docs refresh

            This workflow updates one reviewable branch instead of pushing directly to main.
            Scheduled file modifications stop after 2026-06-03 unless manually forced.
